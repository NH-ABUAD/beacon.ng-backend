      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CrimeType'
          description: ''
  /api/reports/evidence/{id}/:
    delete:
      operationId: reports_evidence_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this evidence.
        required: true
      tags:
      - reports
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/reports/my/:
    get:
      operationId: reports_my_retrieve
      tags:
      - reports
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
